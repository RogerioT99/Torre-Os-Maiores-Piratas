<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torre dos Imperadores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">

    <div class="header-content">

        <img src="images/Logo.png" alt="Torre do Papel" class="logo">

        <div>
            <h1>TORRE DO PAPEL</h1>
            <p>Caçada dos Piratas!</p>
        </div>

    </div>

    <div class="controls">

        <input
            type="text"
            id="search"
            placeholder="🔎 Buscar pirata..."
        >

        <select id="sort">
            <option value="desc">Maior Pontuação</option>
            <option value="asc">Menor Pontuação</option>
        </select>

    </div>

</header>

<section class="stats">

    <div class="stat-card">
        <h3>🏴‍☠️ Piratas</h3>
        <span id="totalPlayers">0</span>
    </div>

    <div class="stat-card">
        <h3>👑 Líder Atual</h3>
        <span id="leaderName">-</span>
    </div>

    <div class="stat-card">
        <h3>🏆 Maior Pontuação</h3>
        <span id="leaderPoints">0</span>
    </div>

</section>

<main>

    <ul id="ranking-list"></ul>

</main>

<script src="script.js"></script>

</body>
</html>
